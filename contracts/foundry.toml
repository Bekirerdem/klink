[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./" }]

# Monad testnet — chain ID 10143
[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
local = "http://127.0.0.1:8545"

[etherscan]
monad_testnet = { key = "${MONAD_API_KEY}", url = "https://testnet.monadexplorer.com/api", chain = 10143 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
